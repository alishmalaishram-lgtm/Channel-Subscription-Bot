services:
  - type: worker
    name: telegram-subscription-bot
    runtime: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      python bot.py

    autoDeploy: true

    envVars:
      - key: BOT_TOKEN
        sync: false

      - key: MONGO_URI
        sync: false

      - key: DATABASE_NAME
        value: telegram_bot

      - key: ADMIN_IDS
        sync: false

      - key: UPI_ID
        sync: false

      - key: SUPPORT_USERNAME
        sync: false
